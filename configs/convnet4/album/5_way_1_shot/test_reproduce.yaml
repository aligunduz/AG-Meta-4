dataset: meta-album
test:
  root_path: materials/album
  split: meta-test
  domains: [BRD, DOG, AWA, FLW, FNG, PLT_NET, SPT, ACT_40, ACT_410]
  class_split_manifest: materials/album/natural_cluster_class_split.json
  image_size: 84
  normalization: False
  transform: null
  n_batch: 150
  n_episode: 4
  n_way: 5
  n_shot: 1
  n_query: 15

load: ./save/convnet4_album_natural_cluster_maml_5_way_1_shot/max-va.pth

inner_args:
  n_step: 10
  encoder_lr: 0.01
  classifier_lr: 0.01
  first_order: False  # set to True for FOMAML
  frozen:
    - bn

use_gradient_transport: false
use_amp: true
epoch: 10
